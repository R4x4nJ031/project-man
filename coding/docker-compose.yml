version: "3.9"

services:

  postgres:
    image: postgres:15.5
    container_name: project-man-postgres
    environment:
      POSTGRES_USER: project
      POSTGRES_PASSWORD: projectpass
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: